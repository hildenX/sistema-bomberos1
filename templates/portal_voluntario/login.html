{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0202">
    <title>Portal Voluntarios — Bomberos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
    --rojo:       #c0392b;
    --rojo-hover: #a93226;
    --dorado:     #c8942a;
    --fondo:      #0a0202;
    --card-bg:    #151515;
    --borde:      #252525;
    --texto:      #f0f0f0;
    --sub:        #7a7a7a;
    --input-bg:   #1c1c1c;
    --error:      #ff4545;
    --exito:      #2ecc71;
    --radius:     16px;
}

html { height: 100%; }

body {
    min-height: 100%;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--fondo);
    background-image:
        radial-gradient(ellipse at 50% 0%, rgba(192,57,43,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(120,20,20,0.18) 0%, transparent 50%);
    color: var(--texto);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 20px 16px 32px;
    -webkit-font-smoothing: antialiased;
}

/* ===== CARD ===== */
.portal-card {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border: 1px solid var(--borde);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}

/* ===== HEADER DE LA CARD ===== */
.card-header {
    background: linear-gradient(135deg, #1a0404 0%, #2a0808 100%);
    border-bottom: 1px solid rgba(200,148,42,0.15);
    padding: 28px 28px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
}

.card-logo {
    width: 64px;
    height: 64px;
    object-fit: contain;
    flex-shrink: 0;
    filter: drop-shadow(0 4px 12px rgba(192,57,43,0.4));
}

.card-header-text {}

.card-tag {
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--dorado);
    margin-bottom: 4px;
}

.card-title {
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--texto);
    line-height: 1.2;
    letter-spacing: -0.2px;
}

/* ===== CUERPO ===== */
.card-body {
    padding: 28px 28px 24px;
}

.card-desc {
    font-size: 0.875rem;
    color: var(--sub);
    line-height: 1.55;
    margin-bottom: 24px;
}

/* ===== FORM ===== */
.portal-form {
    display: flex;
    flex-direction: column;
    gap: 16px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
}

.form-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--sub);
    letter-spacing: 0.7px;
    text-transform: uppercase;
}

.input-wrap {
    position: relative;
    display: flex;
    align-items: center;
}

.input-ico {
    position: absolute;
    left: 14px;
    color: #3a3a3a;
    display: flex;
    pointer-events: none;
    transition: color 0.2s;
}

.input-ico svg { width: 17px; height: 17px; }

.form-input {
    width: 100%;
    padding: 15px 16px 15px 44px;
    background: var(--input-bg);
    border: 1.5px solid var(--borde);
    border-radius: 12px;
    color: var(--texto);
    font-size: 1rem;           /* 1rem evita zoom en iOS */
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
}

.form-input::placeholder { color: #333; }

.form-input:focus {
    border-color: var(--rojo);
    box-shadow: 0 0 0 3px rgba(192,57,43,0.15);
}

.input-wrap:focus-within .input-ico { color: var(--rojo); }

/* Toggle contraseña */
.toggle-pwd {
    position: absolute;
    right: 13px;
    background: none;
    border: none;
    cursor: pointer;
    color: #3a3a3a;
    padding: 6px;
    line-height: 0;
    transition: color 0.2s;
    /* área táctil mínima */
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
}

.toggle-pwd:hover { color: var(--sub); }
.toggle-pwd svg   { width: 18px; height: 18px; }

#portalPassword { padding-right: 48px; }

/* ===== ALERTA ERROR ===== */
.portal-error {
    display: none;
    padding: 12px 14px;
    background: rgba(255,69,58,0.1);
    border: 1px solid rgba(255,69,58,0.25);
    border-radius: 10px;
    color: var(--error);
    font-size: 0.875rem;
    font-weight: 500;
    line-height: 1.4;
}

.portal-error.show { display: block; }

/* ===== BOTÓN ===== */
.submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--rojo);
    border: none;
    border-radius: 12px;
    color: #fff;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 4px;
    transition: background 0.2s, box-shadow 0.2s, transform 0.1s;
    /* tap-highlight off en móvil */
    -webkit-tap-highlight-color: transparent;
    /* mínimo área táctil */
    min-height: 52px;
}

.submit-btn:hover:not(:disabled) {
    background: var(--rojo-hover);
    box-shadow: 0 4px 20px rgba(192,57,43,0.35);
}

.submit-btn:active:not(:disabled) { transform: scale(0.97); }
.submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

.btn-spinner {
    display: none;
    width: 18px;
    height: 18px;
    border: 2.5px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
}

.submit-btn.loading .btn-spinner { display: inline-block; }
.submit-btn.loading .btn-text    { opacity: 0.75; }

@keyframes spin { to { transform: rotate(360deg); } }

/* ===== FOOTER CARD ===== */
.card-footer {
    padding: 0 28px 24px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.card-footer svg { width: 14px; height: 14px; color: var(--sub); flex-shrink: 0; }

.card-footer p {
    font-size: 0.82rem;
    color: var(--sub);
    line-height: 1.45;
}

/* ===== BACK LINK ===== */
.back-link {
    margin-top: 20px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.85rem;
    color: var(--sub);
    text-decoration: none;
    transition: color 0.2s;
    padding: 8px 0;
}

.back-link svg  { width: 14px; height: 14px; }
.back-link:hover { color: var(--dorado); }

/* ===== RESPONSIVE ===== */
@media (max-width: 480px) {
    body { padding: 0; justify-content: flex-start; }

    .portal-card {
        max-width: 100%;
        border-radius: 0;
        border-left: none;
        border-right: none;
        border-top: none;
        min-height: 100dvh;
        display: flex;
        flex-direction: column;
        box-shadow: none;
    }

    .card-header  { padding: 24px 20px 20px; }
    .card-body    { padding: 24px 20px 20px; flex: 1; }
    .card-footer  { padding: 0 20px 28px; }
    .card-logo    { width: 52px; height: 52px; }
    .card-title   { font-size: 1.15rem; }

    .form-input   { font-size: 1rem; } /* evita zoom iOS */

    .back-link    { margin: 16px 20px; }
}
    </style>
</head>
<body>

<div class="portal-card">

    <!-- Header con logo -->
    <div class="card-header">
        <img src="{% static 'img/logobomba.png' %}" alt="Logo Compañía de Bomberos" class="card-logo">
        <div class="card-header-text">
            <p class="card-tag">Portal Voluntarios</p>
            <h1 class="card-title">Portal de Pagos</h1>
        </div>
    </div>

    <!-- Formulario -->
    <div class="card-body">
        <p class="card-desc">Ingreso exclusivo para voluntarios. Revisa tus deudas y envía comprobantes al tesorero.</p>

        <form id="portalLoginForm" class="portal-form" novalidate autocomplete="on">

            <div class="form-group">
                <label for="portalUsername" class="form-label">Usuario</label>
                <div class="input-wrap">
                    <span class="input-ico" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </span>
                    <input type="text" id="portalUsername" name="username" class="form-input"
                           placeholder="Tu nombre de usuario"
                           autocomplete="username" required autofocus
                           inputmode="text" enterkeyhint="next">
                </div>
            </div>

            <div class="form-group">
                <label for="portalPassword" class="form-label">Contraseña</label>
                <div class="input-wrap">
                    <span class="input-ico" aria-hidden="true">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" id="portalPassword" name="password" class="form-input"
                           placeholder="Tu contraseña"
                           autocomplete="current-password" required
                           enterkeyhint="done">
                    <button type="button" class="toggle-pwd" id="portalTogglePwd" aria-label="Mostrar contraseña">
                        <svg id="portalEye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="portal-error" id="portalLoginError" role="alert" aria-live="assertive"></div>

            <button type="submit" class="submit-btn" id="portalSubmitBtn">
                <span class="btn-text">Ingresar al Portal</span>
                <span class="btn-spinner" aria-hidden="true"></span>
            </button>

        </form>
    </div>

    <!-- Footer -->
    <div class="card-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p>¿Sin credenciales? Contáctate con el tesorero de tu compañía.</p>
    </div>

</div>

<a href="/" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <polyline points="15 18 9 12 15 6"/>
    </svg>
    Volver al sistema
</a>

<script src="{% static 'js/portal-voluntario.js' %}"></script>
<script>
// Toggle contraseña
(function () {
    const btn = document.getElementById('portalTogglePwd');
    const inp = document.getElementById('portalPassword');
    const eye = document.getElementById('portalEye');
    if (!btn) return;
    btn.addEventListener('click', function () {
        const show = inp.type === 'password';
        inp.type = show ? 'text' : 'password';
        btn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
        eye.innerHTML = show
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });
})();

// Loading state del botón
(function () {
    const form = document.getElementById('portalLoginForm');
    const btn  = document.getElementById('portalSubmitBtn');
    if (!form || !btn) return;
    form.addEventListener('submit', function () {
        // El script portal-voluntario.js maneja el submit real.
        // Aquí solo activamos el estado visual.
        btn.classList.add('loading');
        btn.disabled = true;
        // Reset en caso de error (portal-voluntario.js muestra el error)
        setTimeout(() => {
            if (btn.disabled) {
                btn.classList.remove('loading');
                btn.disabled = false;
            }
        }, 8000);
    });
})();
</script>
</body>
</html>
