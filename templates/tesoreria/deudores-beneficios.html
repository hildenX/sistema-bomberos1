{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deudores de Beneficios</title>
    <link rel="stylesheet" href="{% static 'css/global-profesional.css' %}">
    <link rel="stylesheet" href="{% static 'css/tema-bomberil.css' %}">
    <style>
        body {
            background: #f4f5f9;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
        }
        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 28px 20px 48px;
        }
        /* Header */
        .page-header {
            background: linear-gradient(135deg, #be185d 0%, #9d174d 100%);
            color: white;
            border-radius: 16px;
            padding: 22px 28px;
            margin-bottom: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
            box-shadow: 0 4px 20px rgba(190, 24, 93, 0.25);
        }
        .page-header h1 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .page-header p {
            margin: 4px 0 0;
            font-size: 0.85rem;
            opacity: 0.85;
        }
        .header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        /* Resumen */
        .resumen-card {
            background: linear-gradient(135deg, #fce7f3 0%, #fbcfe8 100%);
            border-radius: 14px;
            padding: 20px 28px;
            margin-bottom: 22px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            gap: 20px;
            border-left: 5px solid #ec4899;
            box-shadow: 0 2px 10px rgba(236, 72, 153, 0.15);
        }
        .resumen-item {
            text-align: center;
        }
        .resumen-label {
            font-size: 0.78rem;
            font-weight: 700;
            color: #831843;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .resumen-valor {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }
        .resumen-valor.rosa { color: #ec4899; }
        .resumen-valor.verde { color: #059669; }
        .resumen-divider {
            width: 1px;
            height: 50px;
            background: rgba(131, 24, 67, 0.2);
        }
        /* Tabla */
        .tabla-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
        }
        .tabla-toolbar {
            padding: 16px 22px;
            background: #f8f9fb;
            border-bottom: 1px solid #eeeef4;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .tabla-toolbar span {
            font-size: 0.88rem;
            color: #666;
            font-weight: 500;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        thead {
            background: linear-gradient(135deg, #be185d 0%, #9d174d 100%);
            color: white;
        }
        thead th {
            padding: 13px 16px;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            text-transform: uppercase;
        }
        thead th:last-child { text-align: right; }
        tbody tr {
            border-bottom: 1px solid #f0f0f4;
            transition: background 0.15s ease;
        }
        tbody tr:hover { background: #faf8fb; }
        tbody tr:last-child { border-bottom: none; }
        tbody td {
            padding: 12px 16px;
            font-size: 0.9rem;
            color: #333;
        }
        tbody td:first-child { color: #888; font-weight: 600; }
        .td-deuda { text-align: right; font-weight: 700; color: #059669; }
        .td-beneficio { color: #831843; font-weight: 600; font-size: 0.85rem; }
        .td-clave { color: #6b7280; }
        .td-tarjetas { text-align: center; color: #6b7280; }
        /* Estado vacio */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #888;
        }
        .empty-state p { font-size: 1rem; margin: 8px 0 0; }
        /* Cargando */
        #loadingMsg {
            padding: 50px 20px;
            text-align: center;
            color: #666;
            font-size: 1rem;
        }
        /* Botones */
        .btn-volver {
            background: linear-gradient(135deg, #374151 0%, #1f2937 100%);
            color: white;
            border: none;
            padding: 11px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(55, 65, 81, 0.25);
            text-decoration: none;
        }
        .btn-volver:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(55, 65, 81, 0.35);
        }
        .btn-close {
            background: #f3f4f6;
            color: #374151;
            border: none;
            padding: 11px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }
        .btn-close:hover { background: #e5e7eb; }
        /* Print styles */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .tabla-card { box-shadow: none; }
            .resumen-card { border: 1px solid #ccc; }
        }
    </style>
    <link rel="stylesheet" href="{% static 'css/tesoreria-dark.css' %}?v=5">
</head>
<body>
<div class="page-wrap">

    <!-- Header -->
    <div class="page-header no-print">
        <div>
            <h1>Deudores de Beneficios</h1>
            <p id="subtitulo">Voluntarios con beneficios pendientes de pago</p>
        </div>
        <div class="header-actions">
            <button type="button" class="btn-volver" onclick="window.location.href='/sistema.html'">&#8592; Volver</button>
            <button type="button" class="btn-close" onclick="window.close()">&#10005; Cerrar</button>
        </div>
    </div>

    <!-- Resumen -->
    <div class="resumen-card" id="resumenCard" style="display:none;">
        <div class="resumen-item">
            <div class="resumen-label">Total Deudores</div>
            <div class="resumen-valor rosa" id="totalDeudores">0</div>
        </div>
        <div class="resumen-divider"></div>
        <div class="resumen-item">
            <div class="resumen-label">Deuda Total</div>
            <div class="resumen-valor verde" id="totalDeuda">$0</div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="tabla-card">
        <div class="tabla-toolbar no-print">
            <span id="contadorRegistros"></span>
        </div>

        <div id="loadingMsg">Cargando deudores...</div>

        <div id="tablaWrapper" style="display:none; overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th style="width:42px">#</th>
                        <th>Voluntario</th>
                        <th>Clave</th>
                        <th>Beneficio</th>
                        <th style="text-align:center">Tarjetas</th>
                        <th style="text-align:right">Deuda</th>
                    </tr>
                </thead>
                <tbody id="tablaBody"></tbody>
            </table>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
            <div style="font-size:3rem;">&#10004;&#65039;</div>
            <p>No hay deudores de beneficios actualmente.</p>
        </div>
    </div>

</div>

<script>
    const API_BASE = '/api/voluntarios';

    async function cargarDeudores() {
        document.getElementById('loadingMsg').style.display = 'block';
        document.getElementById('tablaWrapper').style.display = 'none';
        document.getElementById('emptyState').style.display = 'none';
        document.getElementById('resumenCard').style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/deudores-beneficios-listado/`, {
                credentials: 'include'
            });
            if (!res.ok) throw new Error('Error al cargar datos');
            const data = await res.json();

            document.getElementById('loadingMsg').style.display = 'none';

            if (!data.success || data.total === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('contadorRegistros').textContent = 'Sin deudores';
                return;
            }

            // Resumen
            const totalDeuda = data.deudores.reduce((s, d) => s + parseFloat(d.monto_pendiente || 0), 0);
            document.getElementById('totalDeudores').textContent = data.total;
            document.getElementById('totalDeuda').textContent = '$' + totalDeuda.toLocaleString('es-CL');
            document.getElementById('resumenCard').style.display = 'flex';
            document.getElementById('contadorRegistros').textContent = `Mostrando ${data.total} deudor${data.total !== 1 ? 'es' : ''}`;

            // Filas
            const tbody = document.getElementById('tablaBody');
            tbody.innerHTML = '';
            data.deudores.forEach((d, i) => {
                const monto = parseFloat(d.monto_pendiente || 0);
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${i + 1}</td>
                    <td><strong>${d.voluntario_nombre || ''}</strong></td>
                    <td class="td-clave">${d.voluntario_clave || 'N/A'}</td>
                    <td class="td-beneficio">${d.beneficio_nombre || ''}</td>
                    <td class="td-tarjetas">${d.tarjetas_asignadas || 0}</td>
                    <td class="td-deuda">$${monto.toLocaleString('es-CL')}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('tablaWrapper').style.display = 'block';

        } catch (err) {
            document.getElementById('loadingMsg').textContent = 'Error al cargar datos: ' + err.message;
        }
    }

    // Carga inicial
    cargarDeudores();
</script>
</body>
</html>
