{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Gestión — Bomberos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/login.css' %}">
</head>
<body>

<!-- ===== PRELOADER ===== -->
<div id="preloader" aria-hidden="true">
    <div class="preloader-inner">
        <img src="{% static 'img/logobomba.png' %}" alt="Logo" class="preloader-logo">
        <div class="preloader-bar"><div class="preloader-fill"></div></div>
        <p class="preloader-text">Cargando sistema…</p>
    </div>
</div>

<!-- ===== FONDO FUEGO (canvas) ===== -->
<canvas id="fireCanvas" aria-hidden="true"></canvas>

<!-- ===== CONTENIDO PRINCIPAL ===== -->
<div class="login-screen" id="loginScreen">
    <div class="login-split">

        <!-- PANEL IZQUIERDO: BRANDING -->
        <div class="brand-panel">
            <div class="brand-panel-inner">
                <div class="brand-emblem">
                    <img src="{% static 'img/logobomba.png' %}" alt="Logo Compañía de Bomberos" class="brand-logo-img">
                </div>
                <div class="brand-text">
                    <p class="brand-tag">CUERPO DE BOMBEROS</p>
                    <h1 class="brand-name">Compañía de<br>Bomberos</h1>
                    <p class="brand-motto">Voluntarios al Servicio<br>de la Comunidad</p>
                </div>
                <div class="brand-footer-text">
                    <span>Sistema de Gestión Interna</span>
                </div>
            </div>
            <div class="brand-corner-deco" aria-hidden="true"></div>
        </div>

        <!-- PANEL DERECHO: FORMULARIO -->
        <div class="form-panel">
            <div class="form-panel-inner">

                <div class="form-header">
                    <h2 class="form-title">Iniciar Sesión</h2>
                    <p class="form-subtitle">Ingresa tus credenciales para continuar</p>
                </div>

                <form id="loginForm" class="login-form" novalidate autocomplete="on">

                    <div class="form-group">
                        <label for="username" class="form-label">Usuario</label>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                    <circle cx="12" cy="7" r="4"/>
                                </svg>
                            </span>
                            <input type="text" id="username" name="username" class="form-input"
                                   placeholder="Nombre de usuario" autocomplete="username" required autofocus>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password" class="form-label">Contraseña</label>
                        <div class="input-wrapper">
                            <span class="input-icon" aria-hidden="true">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                                </svg>
                            </span>
                            <input type="password" id="password" name="password" class="form-input"
                                   placeholder="Contraseña" autocomplete="current-password" required>
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Mostrar contraseña">
                                <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-alert error-alert" id="errorMessage" role="alert" aria-live="assertive"></div>
                    <div class="form-alert success-alert" id="successMessage" role="status" aria-live="polite"></div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Iniciar Sesión</span>
                        <span class="btn-spinner" aria-hidden="true"></span>
                    </button>

                </form>

                <div class="form-divider"><span>o</span></div>

                <div class="form-footer">
                    <a href="/portal/" class="portal-link">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                            <circle cx="9" cy="7" r="4"/>
                            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                        </svg>
                        Acceso Portal Voluntarios
                    </a>
                </div>

            </div>
        </div>

    </div>
</div>

<script src="{% static 'js/fire.js' %}"></script>
<script src="{% static 'js/auth_django.js' %}"></script>
<script>
// Preloader
(function () {
    const pre = document.getElementById('preloader');
    const fill = pre.querySelector('.preloader-fill');
    let prog = 0;

    const interval = setInterval(() => {
        prog = Math.min(prog + Math.random() * 18, 90);
        fill.style.width = prog + '%';
    }, 120);

    window.addEventListener('load', () => {
        clearInterval(interval);
        fill.style.width = '100%';
        setTimeout(() => {
            pre.classList.add('hidden');
            window.dispatchEvent(new Event('fireStart'));
        }, 350);
    });
})();
</script>
</body>
</html>
